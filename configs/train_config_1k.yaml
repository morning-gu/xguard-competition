# XGuard 微调训练配置 - 本地1K数据专用版
# 使用精选的1000条高质量数据进行训练

# 模型配置
base_model_path: "Alibaba-AAIG/YuFeng-XGuard-Reason-0.6B"
model_max_length: 1024  # 1024 足够用, 且显存友好

# 数据配置
data_source: "local"
local_data_path: "data/xguard_train_curated_1k.jsonl"  # 使用本地精选的1K数据
max_train_samples: null  # null表示使用全部数据(即全部1K条)
prompt_template_path: null

# LoRA 配置
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: null

# 训练超参数
output_dir: "outputs/checkpoints_1k"
num_train_epochs: 5  # 1K数据, 多跑几轮

# 批次配置 - 充分利用显存
per_device_train_batch_size: 8  # 增大batch, 提升显存利用率
gradient_accumulation_steps: 2  # 累积梯度, 等效batch=16

# 学习率配置
learning_rate: 2.0e-5
weight_decay: 0.01
warmup_ratio: 0.1
lr_scheduler_type: "cosine"

# 日志和保存配置
logging_steps: 10
save_steps: 100
save_total_limit: 3

# 混合精度训练
bf16: true
fp16: false

# 内存优化
gradient_checkpointing: true

# 数据加载优化
dataloader_num_workers: 2
dataloader_pin_memory: true

# 其他优化
seed: 42
remove_unused_columns: false
