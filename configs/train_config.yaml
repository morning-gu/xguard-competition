# XGuard 微调训练配置

# 模型配置
base_model_path: "Alibaba-AAIG/YuFeng-XGuard-Reason-0.6B"
model_max_length: 2048

# 数据配置
data_source: "modelscope"  # "modelscope", "huggingface", "local"
local_data_path: null
max_train_samples: null
prompt_template_path: null

# LoRA 配置
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: null  # null 表示自动选择 Qwen3 默认模块

# 训练超参数
output_dir: "outputs/checkpoints"
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
weight_decay: 0.01
warmup_ratio: 0.1
lr_scheduler_type: "cosine"
logging_steps: 10
save_steps: 500
save_total_limit: 3
bf16: true
fp16: false
gradient_checkpointing: true
seed: 42
